<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>G Bank</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
margin:0;
}

.header{
background:black;
padding:15px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.container{
width:350px;
margin:auto;
margin-top:20px;
background:#141414;
padding:20px;
border-radius:12px;
}

input{
width:90%;
padding:12px;
margin:6px;
background:#1f1f1f;
border:none;
color:white;
border-radius:8px;
}

button{
padding:12px;
margin:6px;
border:none;
border-radius:8px;
background:#2ecc71;
color:white;
cursor:pointer;
width:90%;
}

.social button{
background:#2a2a2a;
}

.hidden{
display:none;
}

.bankCard{
margin:auto;
margin-top:15px;
width:320px;
height:190px;
border-radius:18px;
background:linear-gradient(145deg,#000,#1a1a1a);
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,0.8);
position:relative;
transition:0.3s;
}

.bankCard:hover{
transform:scale(1.03);
}

.cardTitle{
font-size:20px;
font-weight:bold;
}

.cardChip{
width:40px;
height:30px;
background:gold;
border-radius:6px;
margin-top:15px;
}

.cardNumber{
position:absolute;
bottom:60px;
font-size:18px;
letter-spacing:2px;
}

.cardIban{
position:absolute;
bottom:35px;
font-size:12px;
color:#aaa;
}

.cardName{
position:absolute;
bottom:10px;
font-size:14px;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:20px;
}

.menu button{
background:#1c1c1c;
height:60px;
font-size:14px;
}

.profile img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
}

#notify{
position:fixed;
top:20px;
right:20px;
background:#1c1c1c;
padding:10px;
border-radius:8px;
display:none;
}

ul{
text-align:left;
}

</style>

</head>

<body>

<div id="notify"></div>

<div class="header">🏦 G Bank</div>

<div class="container" id="login">

<h2>Giriş</h2>

<input id="user" placeholder="Kullanıcı adı">
<input id="pass" type="password" placeholder="Şifre">

<button onclick="login()">Giriş Yap</button>

<p>Hesabın yok mu?</p>

<button onclick="openRegister()">Kayıt Ol</button>

<div class="social">

<p>veya</p>

<button onclick="socialRegister('Google')">Google ile giriş</button>
<button onclick="socialRegister('Github')">Github ile giriş</button>
<button onclick="socialRegister('Instagram')">Instagram ile giriş</button>

</div>

</div>

<div class="container hidden" id="register">

<h2>Kayıt Ol</h2>

<input id="regUser" placeholder="Kullanıcı adı">
<input id="regPass" type="password" placeholder="Şifre">

<button onclick="register()">Kayıt Ol</button>

<button onclick="socialRegister('Google')">Google ile kayıt</button>
<button onclick="socialRegister('Github')">Github ile kayıt</button>
<button onclick="socialRegister('Instagram')">Instagram ile kayıt</button>

<button onclick="backLogin()">Girişe dön</button>

</div>

<div class="container hidden" id="app">

<h2 id="welcome"></h2>

<div class="bankCard">

<div class="cardTitle">G Bank Pro</div>

<div class="cardChip"></div>

<div class="cardNumber">**** **** **** 2026</div>

<div class="cardIban" id="iban"></div>

<div class="cardName" id="cardName"></div>

</div>

<p>Bakiye: <span id="money"></span> ₺</p>

<h3>Para Gönder</h3>

<input id="sendIban" placeholder="IBAN">
<input id="sendMoneyInput" placeholder="Miktar">

<button onclick="sendMoney()">Gönder</button>

<div class="menu">

<button onclick="addFriend()">👥 Arkadaş Ekle</button>

<button onclick="openProfile()">⚙️ Profil</button>

<button onclick="requestMoney()">💸 Para İste</button>

<button onclick="copyIBAN()">🏦 IBAN Kopyala</button>

</div>

<h3>📊 Hesap Hareketleri</h3>

<ul id="historyList"></ul>

<p id="msg"></p>

</div>

<div class="container hidden" id="profile">

<h2>Profil Ayarları</h2>

<div class="profile">

<img id="profilePic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">

<br><br>

<input type="file" onchange="changePhoto(event)">

</div>

<input id="newName" placeholder="Yeni kullanıcı adı">

<button onclick="changeName()">Kullanıcı adını değiştir</button>

<button onclick="backApp()">Geri</button>

</div>

<script>

let balance = 5000
let username = ""
let users = {}
let transactions = []
let friends = []

function randomIBAN(){
return "GRY" + Math.floor(Math.random()*100000000000)
}

function notify(text){

let n=document.getElementById("notify")

n.innerText=text
n.style.display="block"

setTimeout(()=>{
n.style.display="none"
},3000)

}

function addTransaction(text){

transactions.unshift(text)

updateHistory()

}

function updateHistory(){

let list = document.getElementById("historyList")

list.innerHTML=""

transactions.forEach(t=>{
let li=document.createElement("li")
li.innerText=t
list.appendChild(li)
})

}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="Gojowqxx" && p=="1478Vedat1478"){
balance=999999999
username=u
startApp()
return
}

if(users[u] && users[u]==p){

username=u
startApp()

}

}

function register(){

let u=document.getElementById("regUser").value
let p=document.getElementById("regPass").value

users[u]=p

alert("Kayıt başarılı")

backLogin()

}

function socialRegister(name){

username=name+"User"

startApp()

}

function startApp(){

document.getElementById("login").classList.add("hidden")
document.getElementById("register").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

document.getElementById("welcome").innerText="Hoşgeldin "+username

document.getElementById("iban").innerText=randomIBAN()

document.getElementById("money").innerText=balance

document.getElementById("cardName").innerText=username

}

function sendMoney(){

let amount=parseInt(document.getElementById("sendMoneyInput").value)

if(amount<=balance){

balance-=amount

document.getElementById("money").innerText=balance

addTransaction("💸 "+amount+" TL gönderildi")

notify("Para gönderildi")

}else{

document.getElementById("msg").innerText="Yetersiz bakiye"

}

}

function requestMoney(){

let amount=prompt("İstenecek miktar")

if(amount){

addTransaction("📩 "+amount+" TL para isteği gönderildi")

notify("Para isteği gönderildi")

}

}

function copyIBAN(){

let iban=document.getElementById("iban").innerText

navigator.clipboard.writeText(iban)

notify("IBAN kopyalandı")

}

function addFriend(){

let f=prompt("Arkadaş kullanıcı adı")

friends.push(f)

addTransaction("👥 "+f+" arkadaş eklendi")

notify("Arkadaş eklendi")

}

function openRegister(){

document.getElementById("login").classList.add("hidden")
document.getElementById("register").classList.remove("hidden")

}

function backLogin(){

document.getElementById("register").classList.add("hidden")
document.getElementById("login").classList.remove("hidden")

}

function openProfile(){

document.getElementById("app").classList.add("hidden")
document.getElementById("profile").classList.remove("hidden")

}

function backApp(){

document.getElementById("profile").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

}

function changeName(){

let n=document.getElementById("newName").value

username=n

document.getElementById("welcome").innerText="Hoşgeldin "+username

document.getElementById("cardName").innerText=username

}

function changePhoto(event){

let reader=new FileReader()

reader.onload=function(){

document.getElementById("profilePic").src=reader.result

}

reader.readAsDataURL(event.target.files[0])

}

</script>

</body>
</html>
